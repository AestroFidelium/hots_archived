# [profile.dev]
# opt-level = 0        # минимальная оптимизация → быстрее всего
# codegen-units = 256  # больше параллельности
# incremental = true   # инкрементальная компиляция
# debug = 1            # чуть меньше отладочной информации
# strip = false

# [profile.dev.build-override]
