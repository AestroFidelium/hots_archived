cargo-features = ["profile-rustflags"]

[package]
name = "heroes_of_the_storm_on_rust"
version = "0.1.0"
edition = "2024"
default-run = "client"

[[bin]]
name = "server"
path = "src/server/main.rs"

[[bin]]
name = "client"
path = "src/client/main.rs"

[dependencies]
winit = { version = "0.30.12" }
env_logger = { version = "0.11.5" }
log = { version = "0.4.22" }
rand = "0.9.2"
glium = "*"
image = "0.25.8"
glutin = "0.32.3"
obj = "0.10.2"
raw-window-handle = "0.6.2"
glutin-winit = "0.5.0"
cgmath = "0.18.0"
lazy_static = "1.5.0"
bevy_ecs = "0.16.1"
derive_more = { version = "2.0.1", features = ["full"] }
bevy_time = "0.16.1"
glyph_brush = "0.7.12"
ab_glyph = "0.2.31"
fontdue = "0.9.3"
paste = "1.0.15"
uuid = { version = "1.18.1", features = ["v4", "fast-rng", "rng"] }
tokio = { version = "1.47.1", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
bincode = { version = "2.0.1", features = ["derive", "serde"] }
arc-swap = "1.7.1"
tracing = "0.1.41"
tracing-appender = "0.2.3"
tracing-subscriber = "0.3.20"
thiserror = "2.0.17"
gltf = "1.4.1"
anyhow = "1.0.100"

